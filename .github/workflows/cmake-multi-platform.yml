name: CMake on multiple platforms
on:
  workflow_dispatch:
    
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2022, macos-latest]
        build_type: [Release, Debug]
        c_compiler: [gcc, clang, cl]
        cpp_version: [17, 20]
        xsimd: ['OFF', 'ON']
        include:
          - os: windows-2022
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
          - os: macos-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-2022
            c_compiler: gcc
          - os: windows-2022
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: cl
          - os: macos-latest
            c_compiler: gcc
    steps:
    - uses: actions/checkout@v3
    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"
    - name: Configure CMake
      shell: bash
      run: |
        EXTRA_ARGS=()
        if [[ "${{ matrix.os }}" == "ubuntu-latest" && "${{ matrix.build_type }}" == "Debug" ]]; then
          EXTRA_ARGS+=("-DCMAKE_CXX_FLAGS=-D_GLIBCXX_ASSERTIONS")
        fi
        cmake -B "${{ steps.strings.outputs.build-output-dir }}" \
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }} \
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }} \
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
          -DCMAKE_CXX_STANDARD=${{ matrix.cpp_version }} \
          -DTMECH_USE_XSIMD=${{ matrix.xsimd }} \
          "${EXTRA_ARGS[@]}" \
          -S "${{ github.workspace }}"
    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}
    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }} --output-on-failure

  sanitizers:
    name: sanitizers (${{ matrix.xsimd == 'ON' && 'xsimd' || 'scalar' }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        xsimd: ['OFF', 'ON']
    steps:
    - uses: actions/checkout@v4
    - name: Configure CMake (ASan + UBSan)
      run: >
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_CXX_COMPILER=clang++
        -DCMAKE_C_COMPILER=clang
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_CXX_STANDARD=17
        -DTMECH_USE_XSIMD=${{ matrix.xsimd }}
        -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer"
        -S ${{ github.workspace }}
    - name: Build
      run: cmake --build ${{ github.workspace }}/build
    - name: Test
      working-directory: ${{ github.workspace }}/build
      env:
        ASAN_OPTIONS: detect_leaks=1
        UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
      run: ctest --output-on-failure

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Install lcov
      run: sudo apt-get update && sudo apt-get install -y lcov
    - name: Configure CMake (coverage)
      run: >
        cmake -B ${{ github.workspace }}/build
        -DCMAKE_CXX_COMPILER=g++
        -DCMAKE_C_COMPILER=gcc
        -DCMAKE_BUILD_TYPE=Debug
        -DCMAKE_CXX_STANDARD=17
        -DTMECH_USE_XSIMD=OFF
        -DCMAKE_CXX_FLAGS="--coverage -O0"
        -S ${{ github.workspace }}
    - name: Build
      run: cmake --build ${{ github.workspace }}/build
    - name: Test
      working-directory: ${{ github.workspace }}/build
      run: ctest --output-on-failure
    - name: Collect coverage
      run: |
        lcov --capture --directory ${{ github.workspace }}/build \
             --output-file coverage.info --no-external \
             --directory ${{ github.workspace }}/include || true
        lcov --list coverage.info || true
    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.info
        if-no-files-found: warn
