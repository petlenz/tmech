name: Benchmark

on:
  issue_comment:
    types: [created]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: benchmark-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  benchmark:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.issue.pull_request &&
        github.event.comment.body == '/benchmark'
      )
    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Get PR details
        if: github.event_name == 'issue_comment'
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('ref', pr.head.ref);
            core.setOutput('sha', pr.head.sha);

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y liblapack-dev libblas-dev libboost-dev gfortran
          pip install matplotlib

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.ref || github.ref }}
          path: pr

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: master
          path: main

      - name: Benchmark main
        run: |
          python3 pr/scripts/run_benchmarks.py \
            --source-dir main \
            --build-dir-prefix build_bench_main \
            --output-dir results_main \
            --repetitions 5 \
            --benchmark-filter ".*_tmech"

      - name: Benchmark PR
        run: |
          python3 pr/scripts/run_benchmarks.py \
            --source-dir pr \
            --build-dir-prefix build_bench_pr \
            --output-dir results_pr \
            --repetitions 5 \
            --benchmark-filter ".*_tmech"

      - name: Generate report
        if: always()
        run: |
          python3 main/scripts/run_bench_report.py \
            --input-dir results_pr \
            --mode regression \
            --no-plots \
            --pr-branch "${{ steps.pr.outputs.ref || github.ref_name }}" \
            --baseline-json-dir results_main

      - name: Post PR comment
        if: always() && github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = 'results_pr/benchmark_report.md';
            let body;
            if (fs.existsSync(reportPath)) {
              body = fs.readFileSync(reportPath, 'utf8');
            } else {
              body = '## Benchmark Report\n\nBenchmark run failed — no results available.';
            }

            const sha = '${{ steps.pr.outputs.sha }}'.slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const header = `<!-- tmech-benchmark-bot -->\n**Benchmark results** for ${sha} ([workflow run](${runUrl}))\n\n`;
            body = header + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes('<!-- tmech-benchmark-bot -->'));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            results_main/
            results_pr/
          retention-days: 30
