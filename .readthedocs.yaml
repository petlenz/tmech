# Read the Docs configuration for tmech
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.11"
  apt_packages:
    # Doxygen generates the XML that breathe consumes (conf.py runs it on RTD).
    - doxygen
    - graphviz
    # imgmath renders the custom tensor-notation macros to SVG via LaTeX + dvisvgm.
    - texlive-latex-extra
    - texlive-fonts-extra
    - dvisvgm

sphinx:
  configuration: docs/source/conf.py
  fail_on_warning: false

python:
  install:
    - requirements: docs/requirements.txt
